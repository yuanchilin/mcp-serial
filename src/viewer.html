<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>串口终端</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;height:100vh;display:flex;flex-direction:column}
#bar{background:#111;padding:3px 8px;display:flex;gap:6px;align-items:center;font:11px Consolas,monospace;color:#0f0;flex-shrink:0;border-bottom:1px solid #222}
#bar select,#bar button{background:#000;color:#0f0;border:1px solid #333;padding:2px 8px;font:inherit;cursor:pointer}
#bar button:hover{background:#222}
#bar .st{color:#666;margin-left:auto}
#term{flex:1}
</style>
</head>
<body>
<div id="bar">
  <select id="ps"><option value="">-- 端口 --</option></select>
  <button onclick="rp()">刷新</button>
  <select id="bs">
    <option value="9600">9600</option><option value="115200" selected>115200</option>
    <option value="230400">230400</option><option value="460800">460800</option><option value="921600">921600</option>
  </select>
  <button id="cb" onclick="tc()">连接</button>
  <span class="st" id="st">未连接</span>
</div>
<div id="term"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script>
const CID=sessionStorage.getItem('xtermCid')||(sessionStorage.setItem('xtermCid',crypto.randomUUID()),sessionStorage.getItem('xtermCid'));
const B=window.location.origin;
let ws=null,conn=false;
const T=new Terminal({cols:80,rows:24,fontSize:14,fontFamily:'Consolas,Monaco,monospace',
  theme:{background:'#000',foreground:'#0f0',cursor:'#0f0',selectionBackground:'#0f0',selectionForeground:'#000'}});
T.open(document.getElementById('term'));
T.focus();
T.write('\x1b[32m等待连接...\x1b[0m\r\n');

const ps=document.getElementById('ps'),bs=document.getElementById('bs');
const cb=document.getElementById('cb'),st=document.getElementById('st');

function connectWS(){
  if(ws){try{ws.close()}catch(_){}}
  ws=new WebSocket('ws://'+location.host+'/');
  ws.binaryType='arraybuffer';
  ws.onopen=()=>{};
  ws.onmessage=e=>{if(e.data instanceof ArrayBuffer)T.write(new Uint8Array(e.data))};
  ws.onclose=()=>{ws=null};
  ws.onerror=()=>{};
}

// 无本地回显 — 纯透传
T.onData(data=>{
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(data);
});

async function tc(){
  if(conn){await dc();return}
  let p=ps.value;if(!p)return;
  // 先发连接请求
  let r=await fetch(B+'/connect',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({port:p,baudRate:parseInt(bs.value,10)||115200,clientId:CID})});
  if(!r.ok){st.textContent='连接失败';return}
  conn=true;cb.textContent='断开';cb.style.background='#300';
  st.textContent='已连接 '+p;connectWS();
}
async function dc(){
  let r=await fetch(B+'/disconnect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:CID})});
  if(r.ok){if(ws)ws.close();ws=null;}
  conn=false;cb.textContent='连接';cb.style.background='';st.textContent='未连接';
}
async function rp(){
  try{let r=await fetch(B+'/ports');let a=await r.json();
    ps.innerHTML='<option value="">-- 端口 --</option>';
    a.forEach(p=>{let o=document.createElement('option');o.value=p.path;o.textContent=p.path;ps.appendChild(o)});
  }catch(_){}
}
async function init(){
  rp();
  try{let r=await fetch(B+'/status');let s=await r.json();
    if(s.connected){
      conn=true;cb.textContent='断开';cb.style.background='#300';
      ps.value=s.port||'';bs.value=String(s.baudRate||115200);
      st.textContent='已连接 '+s.port;
      connectWS();
      // 自动成为控制端
      await fetch(B+'/force-control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:CID})});
    }
  }catch(_){}
}
init();
</script>
</body>
</html>
